name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request_target:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: _site/stable

      - name: Checkout latest PR branch
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: _site/preview

      - name: Find latest open PR (on push to main)
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        id: find-pr
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main',
              sort: 'updated',
              direction: 'desc',
              per_page: 1,
            });
            if (prs.data.length > 0) {
              core.setOutput('branch', prs.data[0].head.ref);
              core.setOutput('found', 'true');
            } else {
              core.setOutput('found', 'false');
            }

      - name: Checkout latest PR branch (on push to main)
        if: github.event_name == 'push' && steps.find-pr.outputs.found == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.find-pr.outputs.branch }}
          path: _site/preview

      - name: Build index page
        run: |
          PREVIEW_EXISTS="false"
          if [ -d "_site/preview" ]; then
            PREVIEW_EXISTS="true"
          fi
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>AdventureCraft SimpleSim</title>
            <style>
              body { font-family: sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 40px; }
              a { color: #a0c4ff; }
              .versions { display: flex; gap: 20px; margin-top: 20px; }
              .card { background: #2a2a4a; border: 1px solid #4a4a6a; border-radius: 8px; padding: 20px; min-width: 200px; }
              .card h2 { margin-top: 0; }
            </style>
          </head>
          <body>
            <h1>AdventureCraft SimpleSim</h1>
            <div class="versions">
              <div class="card">
                <h2>Stable</h2>
                <p>Current main branch</p>
                <a href="stable/">Open stable version</a>
              </div>
              <div class="card" id="preview-card">
                <h2>Preview</h2>
                <p>Latest PR branch</p>
                <a href="preview/">Open preview version</a>
              </div>
            </div>
          </body>
          </html>
          HTMLEOF
          if [ "$PREVIEW_EXISTS" = "false" ]; then
            mkdir -p _site/preview
            echo '<html><body style="background:#1a1a2e;color:#e0e0e0;font-family:sans-serif;padding:40px"><h1>No preview available</h1><p>No open PR found. <a href="../stable/" style="color:#a0c4ff">Go to stable version</a></p></body></html>' > _site/preview/index.html
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
