name: PR Preview Comment

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Post preview links
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.payload.pull_request.head.ref;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const baseUrl = `https://${owner}.github.io/${repo}`;
            const body = [
              `## Live Preview`,
              `| Version | Link |`,
              `|---------|------|`,
              `| **Stable** (main) | [${baseUrl}/stable/](${baseUrl}/stable/) |`,
              `| **Preview** (\`${branch}\` @ \`${sha}\`) | [${baseUrl}/preview/](${baseUrl}/preview/) |`,
              ``,
              `> Both versions deployed to GitHub Pages. Preview updates on each push.`,
            ].join('\n');
            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number: context.issue.number,
            });
            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Live Preview'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: context.issue.number, body,
              });
            }
